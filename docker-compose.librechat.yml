# =============================================================================
# docker-compose.librechat.yml — Full integrated stack
#
# Services added on top of docker-compose.yml:
#   ollama              — Ollama LLM runtime (qwen2.5:7b by default)
#   ollama-init         — one-shot: pulls the LLM model at first start
#   mcp-server          — FastMCP SSE bridge (simulation tools → LLM)
#   librechat-mongodb   — MongoDB for LibreChat conversation history
#   librechat-meilisearch — Meilisearch for full-text search
#   librechat           — LibreChat web UI (port 3080)
#
# First-time setup:
#   1. cp .env.librechat.example .env.librechat
#   2. Edit .env.librechat and replace every CHANGE_ME_* value:
#        openssl rand -hex 32   → JWT_SECRET, JWT_REFRESH_SECRET, CREDS_KEY
#        openssl rand -hex 16   → CREDS_IV
#        openssl rand -hex 24   → MEILI_MASTER_KEY
#   3. Build and start the full stack:
#        docker compose -f docker-compose.librechat.yml up --build
#   4. Open http://localhost:3080, register an account, go to Agents,
#      create a "Simulation Assistant" agent (see README for details).
#
# GPU acceleration (Ollama):
#   Uncomment the `deploy` block inside the `ollama` service below.
#
# Swap the LLM:
#   Change the model name in the `ollama-init` command and in librechat.yaml.
#   Recommended models with tool-calling support:
#     qwen2.5:7b   (default, 4.7 GB)
#     qwen2.5:14b  (better quality, 9 GB)
#     llama3.1:8b  (Meta, 4.7 GB)
#     qwen2.5:3b   (lightweight, 2 GB)
#
# Make it portable:
#   The mcp-server container is the only piece that knows about the FastAPI
#   URLs.  To connect any MCP-compatible chat UI or IDE extension,
#   just point its MCP config at http://<host>:8001/sse.
# =============================================================================

include:
  - path: docker-compose.yml

services:

  # ---------------------------------------------------------------------------
  # Ollama — local LLM runtime
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Limit Ollama to a fraction of cores so it doesn't starve FEBio workers.
      # Default: leave unset — Ollama auto-detects.  Set in .env.librechat:
      #   LLM_CPU_FRACTION=0.3  →  on 64 cores, Ollama gets ~19 threads
      # Or pin directly: OLLAMA_NUM_THREAD=16
      OLLAMA_NUM_THREAD: "${OLLAMA_NUM_THREAD:-}"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # ── GPU support (NVIDIA) ─────────────────────────────────────────────────
    # Requires nvidia-container-toolkit on the host:
    #   sudo apt-get install -y nvidia-container-toolkit
    #   sudo nvidia-ctk runtime configure --runtime=docker
    #   sudo systemctl restart docker
    # Then uncomment the deploy block below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # ollama-init — pull the LLM model on first start
  #
  # Runs once, pulls qwen2.5:7b from the Ollama registry, then exits.
  # The model is cached in the ollama_data volume so subsequent starts are fast.
  # ---------------------------------------------------------------------------
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        MODEL="${OLLAMA_MODEL:-qwen2.5:7b}"
        echo "Pulling ${MODEL} (this may take several minutes on first run)..."
        ollama pull "${MODEL}"
        echo "Model pull complete."
    restart: "no"

  # ---------------------------------------------------------------------------
  # MCP Server — exposes simulation tools to LLM clients via SSE
  # ---------------------------------------------------------------------------
  mcp-server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    image: digital-twin-ui:mcp-server
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      SIMULATION_API_URL: "http://api:8000/api/v1"
      # FastMCP reads host/port from these specific env var names
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "8001"
      # Host-side path to the runs directory — shown to users so they can
      # open result files in FEBio Studio without needing docker exec.
      # Set RUNS_HOST_PATH in .env.librechat to the absolute path on YOUR machine.
      # e.g.  RUNS_HOST_PATH=/home/youruser/simulation-api-tool/runs
      RUNS_HOST_PATH: "${RUNS_HOST_PATH:-./runs}"
      # Host-visible path for surrogate data (shown in tool responses)
      # e.g.  SURROGATE_DATA_HOST_PATH=/home/youruser/simulation-api-tool/data/surrogate
      SURROGATE_HOST_PATH: "${SURROGATE_DATA_HOST_PATH:-./data/surrogate}"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); r=s.connect_ex(('localhost',8001)); s.close(); exit(r)\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # LibreChat — MongoDB (conversation history, users, presets)
  # ---------------------------------------------------------------------------
  librechat-mongodb:
    image: mongo:8.0
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # LibreChat — Meilisearch (full-text search over conversations)
  # ---------------------------------------------------------------------------
  librechat-meilisearch:
    # IMPORTANT: stay on v1.7.3 — Meilisearch v1.19+ moved to a non-MIT license.
    # See LICENSES.md before upgrading.
    image: getmeili/meilisearch:v1.7.3
    restart: unless-stopped
    volumes:
      - meilisearch_data:/meili_data
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-insecure-dev-key-change-in-production}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # LibreChat — web UI
  # ---------------------------------------------------------------------------
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    restart: unless-stopped
    ports:
      - "3080:3080"
    volumes:
      # Application config (Ollama endpoint + MCP server definition)
      - ./librechat.yaml:/app/librechat.yaml:ro
      # Custom branding — replaces the LibreChat logo on the login page and nav header
      # LibreChat serves static files from dist/assets (not public/assets)
      - ./branding/dtui-logo.svg:/app/client/dist/assets/logo.svg:ro
      # Custom index.html injects CSS to enlarge and center the logo
      - ./branding/index.html:/app/client/dist/index.html:ro
      # Persistent storage for uploaded images and server logs
      - librechat_images:/app/client/public/images
      - librechat_logs:/app/api/logs
    env_file:
      - .env.librechat
    environment:
      HOST: "0.0.0.0"
      PORT: "3080"
      MONGO_URI: "mongodb://librechat-mongodb:27017/LibreChat"
      MEILI_HOST: "http://librechat-meilisearch:7700"
      APP_TITLE: "Digital Twin User Interface"
    depends_on:
      librechat-mongodb:
        condition: service_healthy
      librechat-meilisearch:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s


  # ---------------------------------------------------------------------------
  # JupyterLab — xplt-parser + surrogate-lab notebook environment
  # ---------------------------------------------------------------------------
  jupyter:
    build:
      context: .
      dockerfile: notebooks/Dockerfile
    image: digital-twin-ui:jupyter
    restart: unless-stopped
    env_file:
      - .env.librechat
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    environment:
      # MLflow tracking server (same network as api/worker)
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      # Surrogate data path inside the Jupyter container
      SURROGATE_DATA_PATH: "/workspace/data/surrogate"
      # PYTHONPATH so xplt_core and surrogate-lab src are importable
      PYTHONPATH: "/workspace/xplt-parser:/workspace/surrogate-lab"
      # Path inside the container where MANUAL_SIMS_HOST_PATH is mounted.
      # Change MANUAL_SIMS_HOST_PATH in .env.librechat to point at your results dir.
      MANUAL_SIMS_PATH: "/workspace/manual_sims"
    volumes:
      # xplt-parser source (for live editing and the original notebook)
      - ./xplt-parser:/workspace/xplt-parser
      # surrogate-lab source (for live editing and the training notebook)
      - ./surrogate-lab:/workspace/surrogate-lab
      # Integration notebooks (full_pipeline, retraining, etc.)
      - ./notebooks:/workspace/notebooks
      # Shared data directory — written by Jupyter, read by API
      - ./data/surrogate:/workspace/data/surrogate
      # Runs directory — read-only access to simulation .xplt results
      - ${RUNS_HOST_PATH:-./runs}:/workspace/runs:ro
      # External / manual simulation results — set MANUAL_SIMS_HOST_PATH in .env
      # Leave the variable unset or blank to skip this mount.
      - ${MANUAL_SIMS_HOST_PATH:-/tmp/unused_manual_sims}:/workspace/manual_sims:ro
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - default
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/api')\""
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s


# ---------------------------------------------------------------------------
# Additional named volumes (base stack volumes are declared in docker-compose.yml)
# ---------------------------------------------------------------------------
volumes:
  ollama_data:
  mongodb_data:
  meilisearch_data:
  librechat_images:
  librechat_logs:
