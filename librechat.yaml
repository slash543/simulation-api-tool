# =============================================================================
# librechat.yaml — Digital Twin User Interface
#
# LibreChat application configuration.
# Mount this file at /app/librechat.yaml inside the librechat container.
#
# Docs: https://www.librechat.ai/docs/configuration/librechat_yaml
#
# LLM Setup:
#   Active   — Ollama (qwen2.5:7b) always available on the local network
#   Optional — Azure OpenAI (gpt-4o): uncomment the azureOpenAI block below
#              and the DTUI-Azure modelSpec, then fill in AZURE_OPENAI_* vars
#              in .env.librechat to activate.
# =============================================================================

version: 1.1.8
cache: true

# ---------------------------------------------------------------------------
# Interface
# ---------------------------------------------------------------------------
interface:
  appTitle: "Digital Twin User Interface"
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true

# ---------------------------------------------------------------------------
# LLM Endpoints
# ---------------------------------------------------------------------------
endpoints:

  # ── Azure OpenAI — optional primary endpoint ────────────────────────────
  # To enable:
  #   1. Fill in all AZURE_OPENAI_* vars in .env.librechat
  #   2. Uncomment the entire azureOpenAI block below
  #   3. Uncomment the DTUI-Azure entry in modelSpecs.list below
  #   4. Restart the stack: docker compose ... up -d librechat
  #
  # azureOpenAI:
  #   titleConvo: true
  #   titleModel: "${AZURE_OPENAI_DEPLOYMENT_NAME}"
  #   groups:
  #     - group: "digital-twin-azure"
  #       apiKey: "${AZURE_OPENAI_API_KEY}"
  #       instanceName: "${AZURE_OPENAI_INSTANCE_NAME}"
  #       version: "${AZURE_OPENAI_API_VERSION}"
  #       models:
  #         gpt-4o:
  #           deploymentName: "${AZURE_OPENAI_DEPLOYMENT_NAME}"
  #         gpt-4o-mini:
  #           deploymentName: "${AZURE_OPENAI_MINI_DEPLOYMENT_NAME}"

  # ── Ollama — always-on local endpoint (no API key needed) ───────────────
  custom:
    - name: "Ollama (local)"
      apiKey: "ollama"
      baseURL: "http://ollama:11434/v1/"
      models:
        default:
          - "qwen2.5:7b"
          - "qwen2.5:14b"
          - "qwen2.5:3b"
        fetch: true
      titleConvo: true
      titleModel: "qwen2.5:7b"
      summarize: false
      modelDisplayLabel: "Ollama"
      dropParams:
        - "user"
      addParams:
        stream: true
        num_ctx: 8192

# ---------------------------------------------------------------------------
# MCP Servers  (tools available to LibreChat Agents)
# ---------------------------------------------------------------------------
mcpServers:
  simulation_tools:
    type: sse
    url: "http://mcp-server:8001/sse"
    # timeout for individual tool calls (ms) — simulations can take ~5 min
    timeout: 360000
    # timeout for initial handshake with MCP server (ms)
    initTimeout: 30000

# Allow the internal Docker hostname for the MCP server
mcpSettings:
  allowedDomains:
    - "mcp-server"
    - "http://mcp-server:8001"
    - "mcp-server:8001"

# ---------------------------------------------------------------------------
# Model Specs — Digital Twin User Interface
# ---------------------------------------------------------------------------
modelSpecs:
  enforce: false
  prioritize: true
  list:

    # ── Azure OpenAI (gpt-4o) — uncomment when azureOpenAI endpoint is active
    # - name: "DTUI-Azure"
    #   label: "Digital Twin User Interface (Azure OpenAI)"
    #   preset:
    #     endpoint: "azureOpenAI"
    #     model: "gpt-4o"
    #     temperature: 0.2
    #     max_tokens: 4096
    #     system: &simulation_system_prompt |
    #       You are an expert digital twin simulation assistant for catheter insertion
    #       biomechanics.  You have access to tools that connect to a FEBio finite-element
    #       simulation pipeline and a trained machine-learning model.
    #
    #       WHAT YOU CAN DO
    #       ──────────────
    #       • Run individual FEBio simulations at a specified insertion speed
    #       • Execute Design-of-Experiments (DOE) campaigns to build synthetic datasets
    #       • Predict contact pressure instantly using the trained neural network
    #       • Poll the status of background jobs
    #
    #       SIMULATION CONTEXT
    #       ──────────────────
    #       • The model simulates catheter insertion into a vascular structure
    #       • Key output: peak contact pressure (Pa) at the catheter–tissue interface
    #       • Typical insertion speeds: 2–10 mm/s
    #       • FEM simulations take 1–5 minutes; ML predictions are instant
    #
    #       WORKFLOW GUIDANCE
    #       ─────────────────
    #       1. Single-speed query → use predict_pressure() for speed, or run_simulation()
    #          for high-fidelity FEM results.
    #       2. Build a synthetic database → run_doe_campaign(n_samples, speed_min, speed_max).
    #          Poll get_doe_status() until complete.
    #       3. Compare FEM vs ML → run both and discuss the agreement.
    #
    #       AFTER EVERY run_simulation() CALL
    #       ──────────────────────────────────
    #       The tool returns immediately (simulation runs in background). ALWAYS tell
    #       the user ALL of the following in your reply:
    #         • The simulation is running in the background.
    #         • host_run_dir — the folder on their machine where files will appear.
    #         • host_xplt_path — the .xplt file to open in FEBio Studio (File > Open).
    #         • log.txt inside that folder shows live solver progress.
    #       Never skip these paths — the user needs them to access results.
    #
    #       Always present pressures with units (Pa or kPa) and interpret results
    #       clinically (contact pressure relevance to tissue trauma, safe speed ranges, etc.).
    #       Be concise, technical, and cite the simulation run_id when available.

    # ── Ollama / qwen2.5:7b — always active ─────────────────────────────────
    - name: "DTUI-Ollama"
      label: "Digital Twin User Interface (Ollama)"
      preset:
        endpoint: "Ollama (local)"
        model: "qwen2.5:7b"
        temperature: 0.2
        max_tokens: 4096
        system: |
          You are an expert digital twin simulation assistant for catheter insertion
          biomechanics. You have access to tools that connect to a FEBio finite-element
          simulation pipeline and a trained machine-learning surrogate model.

          AVAILABLE TOOLS
          ───────────────
          • list_catheter_designs() — list all available catheter designs and sizes
          • refresh_catalogue() — rescan base_configuration/ for new .feb files
          • run_catheter_simulation(design, configuration, speeds_mm_s, dwell_time_s)
              — submit a FEBio simulation job (runs in background)
          • get_task_status(task_id) — poll a running job for PENDING/RUNNING/COMPLETED
          • cancel_simulation(run_id) — cancel a running or queued job
          • list_simulation_jobs(limit) — list recent jobs with status
          • run_doe_campaign(n_samples, speed_min, speed_max) — DOE sweep
          • get_doe_status(campaign_id) — poll a DOE campaign
          • predict_pressure(speed_mm_s) — instant ML prediction (no FEBio needed)
          • list_research_documents() — list indexed PDF chunks
          • ingest_research_documents() — index PDFs from research_documents/
          • search_research_documents(query) — semantic search over PDFs

          SIMULATION WORKFLOW
          ───────────────────
          1. Call list_catheter_designs() to show available options.
          2. Ask the user to pick design, configuration (size), and insertion speed.
          3. Call run_catheter_simulation() with their choices.
          4. Report back: run_id, host_run_dir, host_xplt_path, and log.txt location.
          5. The user can open the .xplt file in FEBio Studio when done.
          6. Poll get_task_status(task_id) if asked for progress.

          AFTER EVERY run_catheter_simulation() CALL
          ──────────────────────────────────────────
          Always tell the user:
            • Simulation is running in the background (task_id and run_id).
            • host_run_dir — folder on their machine where results will appear.
            • host_xplt_path — .xplt file to open in FEBio Studio.
            • log.txt in that folder shows live solver output.

          RESEARCH DOCUMENT WORKFLOW
          ──────────────────────────
          For questions about catheter biomechanics, materials, or clinical context:
          1. Call list_research_documents(). If total_chunks is 0, call
             ingest_research_documents() WITHOUT asking the user first.
          2. Call search_research_documents(query).
          3. Synthesise an answer and cite the source PDF filename for every fact.

          Always include units (Pa or kPa) and interpret results clinically.
          Be concise and cite the run_id when discussing specific simulations.
