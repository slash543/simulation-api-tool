# =============================================================================
# docker-compose.override.yml — development overrides
#
# This file is automatically merged with docker-compose.yml when you run
# `docker compose up` locally.  It is NOT used in production (CI/CD should
# use docker-compose.yml directly with --file).
#
# Changes from production:
#   - Source code is bind-mounted (hot-reload with --reload)
#   - Uvicorn runs with --reload for instant code changes
#   - Ports are forwarded for direct access
#   - Log level raised to DEBUG
#   - Celery worker uses --loglevel=debug
# =============================================================================

services:

  api:
    build:
      context: .
      target: api
    volumes:
      # Live-reload: mount source over the image copy
      - ./digital_twin_ui:/app/digital_twin_ui:ro
      - ./config:/app/config:ro
      - ./templates:/app/templates:ro
      - ${RUNS_HOST_PATH:-./runs}:/app/runs
      - logs_data:/app/logs
      - datasets_data:/app/data
      - models_data:/app/models
      # .feb base files — must be explicit here so they are not lost when Docker
      # Compose applies this override on top of the base file's x-app-volumes anchor.
      - ${BASE_CONFIG_HOST_PATH:-./base_configuration}:/app/base_configuration:ro
      - ./research_documents:/app/research_documents
    environment:
      DTUI__API__LOG_LEVEL: "debug"
      DTUI__LOGGING__LEVEL: "DEBUG"
    command: >
      uvicorn digital_twin_ui.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug

  worker:
    build:
      context: .
      target: worker
    volumes:
      - ./digital_twin_ui:/app/digital_twin_ui:ro
      - ./config:/app/config:ro
      - ./templates:/app/templates:ro
      - ${RUNS_HOST_PATH:-./runs}:/app/runs
      - logs_data:/app/logs
      - datasets_data:/app/data
      - models_data:/app/models
      # .feb base files — must be explicit here so they are not lost when Docker
      # Compose applies this override on top of the base file's x-app-volumes anchor.
      - ${BASE_CONFIG_HOST_PATH:-./base_configuration}:/app/base_configuration:ro
      - ./research_documents:/app/research_documents
      # FEBio binary — required even in dev mode to actually run simulations
      - ./scripts/febio4_wrapper.sh:/usr/local/bin/febio4:ro
      - ${FEBIO_BINARY_PATH:-/opt/febio/bin/febio4}:/opt/febio/bin/febio4:ro
      - ${FEBIO_XML_PATH:-/opt/febio/bin/febio.xml}:/opt/febio/bin/febio.xml:ro
      - ${FEBIO_LIB_PATH:-/opt/febio/lib}:/opt/febio/lib:ro
    environment:
      DTUI__LOGGING__LEVEL: "DEBUG"
    command: >
      celery
      --app digital_twin_ui.tasks.celery_app:celery_app
      worker
      --loglevel=debug
      --concurrency=1
      --queues=celery
